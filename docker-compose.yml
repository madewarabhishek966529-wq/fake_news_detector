version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: fakenews_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: fakenews_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB_NAME=fake_news_db
      - JWT_SECRET_KEY=change_this_in_production
      - CORS_ORIGINS=["http://localhost:5173","http://localhost:3000"]
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: fakenews_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
